name: CI

# Two gates:
#   1. structure — frontmatter/sync/JSON/script-syntax of the skill package (pure python/bash).
#   2. example   — analyze + test the reference game (examples/memory_match) on a real Flutter SDK,
#                  which is the end-to-end proof the skill's doctrine produces working code.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    name: Validate skill, agents & structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # frontmatter/name==folder, skill+agent sync --check, JSON validity, script syntax,
      # and the Cursor globs-format check. Pure python/bash — no Dart toolchain needed.
      - name: Structural quality gate
        run: .agents/skills/dart-mobile-game-studio/scripts/validate-skill.sh

  example:
    name: Reference game (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/memory_match
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter version
        run: flutter --version
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze (pure core + UI)
        run: flutter analyze
      - name: Test (pure-Dart core + widget smoke)
        run: flutter test
      # Note: `dart format --set-exit-if-changed .` is intentionally not gated yet — add it once
      # the formatter has run on a machine with the SDK so the check starts from a clean baseline.
